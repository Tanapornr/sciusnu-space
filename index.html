<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - SCiUS Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700;800&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #ffdcc6; 
            margin: 0; 
            /* ปลดล็อก overflow hidden เพื่อให้มือถือเลื่อนจอได้เวลาคีย์บอร์ดเด้ง */
            overflow-x: hidden; 
        }
        h1, h2, h3, .font-prompt { font-family: 'Prompt', sans-serif; }
        
        .animate-float { animation: float 6s ease-in-out infinite; }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        }

        input::placeholder { color: #cbd5e1; font-size: 0.9rem; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-6 lg:p-8 relative">

    <div class="absolute top-10 left-10 w-48 sm:w-72 h-48 sm:h-72 bg-orange-300 rounded-full mix-blend-multiply filter blur-3xl opacity-60 animate-blob z-0"></div>
    <div class="absolute bottom-10 right-10 w-64 sm:w-96 h-64 sm:h-96 bg-rose-200 rounded-full mix-blend-multiply filter blur-3xl opacity-60 animate-blob animation-delay-2000 z-0"></div>

    <div class="glass-container w-full max-w-[950px] rounded-[2rem] lg:rounded-[3rem] p-2 sm:p-4 flex flex-col md:flex-row relative z-10 mx-auto">
        
        <!-- ปรับ Padding และ Border Radius ให้พอดีกับหน้าจอมือถือ -->
        <div class="w-full md:w-[45%] bg-white rounded-[1.5rem] lg:rounded-[2.5rem] p-6 sm:p-10 lg:p-12 shadow-sm flex flex-col justify-center relative overflow-hidden">
            
            <div class="mb-6 sm:mb-8">
                <p class="text-orange-500 font-bold text-[10px] sm:text-xs uppercase tracking-widest mb-1">SCiUS Portal</p>
                <h1 class="text-3xl sm:text-4xl font-black text-slate-800 font-prompt tracking-tight">Login</h1>
            </div>

            <div class="space-y-4 sm:space-y-5">
                <div>
                    <label class="block text-[10px] sm:text-xs font-bold text-slate-600 mb-2 uppercase tracking-wide">Username</label>
                    <div class="relative">
                        <input type="text" id="username" placeholder="กรอกชื่อผู้ใช้งาน..." class="w-full px-4 sm:px-5 py-3 sm:py-3.5 bg-slate-50 border border-slate-200 rounded-xl sm:rounded-2xl outline-none focus:ring-2 focus:ring-orange-400 focus:bg-white transition-all text-sm font-medium text-slate-700">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] sm:text-xs font-bold text-slate-600 mb-2 uppercase tracking-wide">Password</label>
                    <div class="relative">
                        <input type="password" id="password" placeholder="กรอกรหัสผ่าน..." class="w-full px-4 sm:px-5 py-3 sm:py-3.5 bg-slate-50 border border-slate-200 rounded-xl sm:rounded-2xl outline-none focus:ring-2 focus:ring-orange-400 focus:bg-white transition-all text-sm font-medium text-slate-700">
                        <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-orange-500 transition">
                            <i class="fa-regular fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                    
                    <div class="text-right mt-2">
                        <a href="#" onclick="forgotPassword()" class="text-[10px] sm:text-[11px] font-bold text-orange-500 hover:text-orange-700 transition">Forgot Password?</a>
                    </div>
                </div>

                <button onclick="login()" class="w-full bg-[#f05a28] hover:bg-[#d94a1d] text-white font-bold py-3.5 sm:py-4 rounded-xl sm:rounded-2xl shadow-[0_8px_20px_-6px_rgba(240,90,40,0.6)] active:scale-[0.98] transition-all duration-200 font-prompt text-base sm:text-lg mt-2 sm:mt-4">
                    Sign in
                </button>
            </div>
            
        </div>

        <div class="hidden md:flex w-[55%] items-center justify-center p-8 relative">
            <img src="https://i.postimg.cc/Df9Gq2s3/d-sin-th-y-ngmi-di-t-ngch-x-(15).png" 
                 alt="3D Character" 
                 class="w-[85%] lg:w-[75%] h-auto object-contain animate-float drop-shadow-2xl filter contrast-105">
            
            <div class="absolute top-20 right-20 w-4 h-4 bg-yellow-400 rounded-full animate-float" style="animation-delay: 1s;"></div>
            <div class="absolute bottom-32 left-20 w-6 h-6 bg-green-400 rounded-full animate-float" style="animation-delay: 2s; border-radius: 40% 60% 70% 30%;"></div>
            <div class="absolute top-1/2 right-10 w-3 h-3 bg-orange-400 rounded-full animate-float" style="animation-delay: 0.5s;"></div>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbze1x9SSRsoZSE__Cm6iMzLv9A45ry3eTHB2fkJNktUmRs4yyLgh96s7wUdaPBPSzgIew/exec';

        window.onload = () => { sessionStorage.clear(); localStorage.clear(); };

        document.getElementById("password").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                login();
            }
        });

        function togglePassword() {
            let pwdInput = document.getElementById("password");
            let eyeIcon = document.getElementById("eyeIcon");
            if (pwdInput.type === "password") {
                pwdInput.type = "text";
                eyeIcon.classList.remove("fa-eye");
                eyeIcon.classList.add("fa-eye-slash");
            } else {
                pwdInput.type = "password";
                eyeIcon.classList.remove("fa-eye-slash");
                eyeIcon.classList.add("fa-eye");
            }
        }

        function forgotPassword() {
            Swal.fire({
                icon: 'info',
                title: 'ลืมรหัสผ่าน?',
                text: 'กรุณาติดต่อคุณครูหรือแอดมินผู้ดูแลระบบเพื่อขอรีเซ็ตรหัสผ่านใหม่ครับ',
                confirmButtonColor: '#f05a28',
                confirmButtonText: 'เข้าใจแล้ว',
                customClass: {
                    popup: 'rounded-3xl',
                    confirmButton: 'rounded-full px-8 font-prompt font-bold'
                }
            });
        }

        function login() {
            let u = document.getElementById('username').value.trim();
            let p = document.getElementById('password').value.trim();

            if (!u || !p) {
                Swal.fire({
                    icon: 'warning',
                    title: 'ข้อมูลไม่ครบ',
                    text: 'กรุณากรอก Username และ Password ให้ครบถ้วน',
                    confirmButtonColor: '#f05a28',
                    confirmButtonText: 'ตกลง',
                    customClass: { popup: 'rounded-3xl', confirmButton: 'rounded-full px-8 font-bold' }
                });
                return;
            }

            Swal.fire({
                title: 'กำลังเข้าสู่ระบบ...',
                text: 'กรุณารอสักครู่',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            // ปรับแก้ Headers และการส่งค่า เพื่อป้องกันการโดนบล็อกจากการเชื่อมต่อข้ามโดเมน
            fetch(GAS_URL, {
                redirect: "follow", // จำเป็นสำหรับ Google Apps Script
                method: 'POST',
                headers: {
                    "Content-Type": "text/plain;charset=utf-8" // ใช้ text/plain เลี่ยงการตรวจจับ CORS Preflight
                },
                body: JSON.stringify({ action: "login", username: u, password: p })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    let userObj = {
                        id: data.user.id,
                        name: data.user.name,
                        role: data.user.role,
                        assigned: data.user.assigned,
                        pic: data.user.pic || "",
                        email: data.user.email || "",
                        phone: data.user.phone || ""
                    };
                    
                    sessionStorage.setItem('currentUser', JSON.stringify(userObj));
                    
                    Swal.fire({
                        icon: 'success',
                        title: 'ยินดีต้อนรับ!',
                        text: `เข้าสู่ระบบสำเร็จในฐานะ ${data.user.role}`,
                        showConfirmButton: false,
                        timer: 1500
                    }).then(() => {
                        let r = String(data.user.role).toLowerCase();
                        if (r === 'admin') window.location.href = 'admin.html';
                        else if (r === 'teacher') window.location.href = 'teacher.html';
                        else window.location.href = 'student.html';
                    });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'เข้าสู่ระบบไม่สำเร็จ',
                        text: data.message || 'Username หรือ Password ไม่ถูกต้อง',
                        confirmButtonColor: '#f05a28',
                        confirmButtonText: 'ลองอีกครั้ง',
                        customClass: { popup: 'rounded-3xl', confirmButton: 'rounded-full px-8 font-bold' }
                    });
                }
            })
            .catch(err => {
                console.error("Login Error: ", err);
                Swal.fire({
                    icon: 'error',
                    title: 'เกิดข้อผิดพลาด',
                    text: 'ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้ กรุณาลองใหม่อีกครั้ง หรือตรวจสอบลิงก์ระบบ',
                    confirmButtonColor: '#f05a28',
                    confirmButtonText: 'ตกลง',
                    customClass: { popup: 'rounded-3xl', confirmButton: 'rounded-full px-8 font-bold' }
                });
            });
        }
    </script>
</body>
</html>
