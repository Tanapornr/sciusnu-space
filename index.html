<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - SCiUS Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; color: #334155; }
        h1, h2, h3, .font-prompt { font-family: 'Prompt', sans-serif; }
        
        /* ✨ iOS MINIMALIST SWEETALERT2 ✨ */
        .swal2-popup.swal2-toast { background: rgba(255, 255, 255, 0.85) !important; backdrop-filter: blur(16px) !important; -webkit-backdrop-filter: blur(16px) !important; border: 1px solid rgba(255, 255, 255, 0.5) !important; border-radius: 999px !important; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08) !important; padding: 10px 24px 10px 10px !important; width: auto !important; margin-top: 20px !important; }
        .swal2-toast .swal2-html-container { font-family: 'Prompt', sans-serif !important; margin: 0 !important; }
        .ios-center-popup { background: rgba(255, 255, 255, 0.9) !important; backdrop-filter: blur(24px) !important; -webkit-backdrop-filter: blur(24px) !important; border: 1px solid rgba(255, 255, 255, 0.6) !important; border-radius: 28px !important; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1) !important; padding: 2rem 1.5rem !important; width: auto !important; min-width: 280px !important; max-width: 320px !important; }
        .swal2-popup:not(.swal2-toast):not(.ios-center-popup) { border-radius: 28px !important; background: rgba(255, 255, 255, 0.95) !important; backdrop-filter: blur(20px) !important; -webkit-backdrop-filter: blur(20px) !important; box-shadow: 0 20px 40px rgba(0,0,0,0.1) !important; padding: 2em 1.5em !important; width: 320px !important; border: 1px solid rgba(255, 255, 255, 0.8) !important; }
        .swal2-title { font-family: 'Prompt', sans-serif !important; color: #1d1d1f !important; font-size: 1.15rem !important; margin-bottom: 0.5em !important; }
        .swal2-html-container { font-family: 'Sarabun', sans-serif !important; color: #475569 !important; margin-top: 0.5em !important; font-size: 0.95rem !important;}
        .swal2-confirm { border-radius: 999px !important; font-family: 'Prompt', sans-serif !important; font-weight: 600 !important; padding: 12px 32px !important; background-color: #6d28d9 !important; font-size: 0.95rem !important; box-shadow: 0 8px 20px -6px rgba(109, 40, 217, 0.5) !important; transition: all 0.2s ease !important; }
        .swal2-confirm:hover { background-color: #5b21b6 !important; transform: translateY(-2px) !important; box-shadow: 0 12px 24px -6px rgba(109, 40, 217, 0.6) !important; }
        .swal2-confirm:active { transform: scale(0.96) !important; }
        .swal2-timer-progress-bar { background-color: rgba(109, 40, 217, 0.3) !important; height: 3px !important; }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center p-4 bg-gradient-to-br from-[#f8fafc] to-[#e2e8f0]">
    <div class="bg-white rounded-[2rem] shadow-xl p-8 max-w-md w-full border border-slate-100">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-[#6d28d9] text-white rounded-full flex items-center justify-center text-3xl mx-auto shadow-lg mb-4"><i class="fa-solid fa-sparkles"></i></div>
            <h1 class="text-2xl font-bold font-prompt text-slate-800">เข้าสู่ระบบ</h1>
            <p class="text-slate-500 text-sm mt-2">SCiUS Online Learning Portal</p>
        </div>
        <form id="loginForm" class="space-y-5" onsubmit="event.preventDefault(); login();">
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wide">ชื่อผู้ใช้งาน</label>
                <div class="relative">
                    <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="username" class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-purple-300 transition text-sm" placeholder="Username" required>
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wide">รหัสผ่าน</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="password" id="password" class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-purple-300 transition text-sm" placeholder="Password" required>
                </div>
            </div>
            <button type="submit" class="w-full bg-[#6d28d9] text-white font-bold font-prompt py-4 rounded-xl shadow-lg hover:bg-purple-800 transition active:scale-[0.98]">เข้าสู่ระบบ</button>
        </form>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbze1x9SSRsoZSE__Cm6iMzLv9A45ry3eTHB2fkJNktUmRs4yyLgh96s7wUdaPBPSzgIew/exec';

        // Custom iOS Toast Function
        function showiOSToast(iconClass, text, iconColorBg, iconColorText) {
            Swal.fire({ 
                toast: false, position: 'center', showConfirmButton: false, timer: 2500, customClass: { popup: 'ios-center-popup' },
                html: `<div class="flex flex-col items-center gap-3 text-center"><div class="w-14 h-14 rounded-full ${iconColorBg} ${iconColorText} flex items-center justify-center shadow-sm"><i class="${iconClass} text-2xl"></i></div><span class="font-bold text-slate-800 text-base tracking-wide leading-snug">${text}</span></div>` 
            });
        }

        function login() {
            let u = document.getElementById('username').value.trim();
            let p = document.getElementById('password').value.trim();
            if(!u || !p) return showiOSToast('fa-solid fa-circle-exclamation', 'กรุณากรอกข้อมูลให้ครบ', 'bg-amber-100', 'text-amber-600');

            Swal.fire({ title: 'กำลังตรวจสอบ...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

            fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "login", username: u, password: p }) })
            .then(r => r.json())
            .then(data => {
                if(data.status === "success") {
                    let user = data.user;
                    sessionStorage.setItem('currentUser', JSON.stringify(user));
                    showiOSToast('fa-solid fa-check', 'เข้าสู่ระบบสำเร็จ', 'bg-emerald-100', 'text-emerald-600');
                    setTimeout(() => {
                        let r = String(user.role).toLowerCase().trim();
                        if(r === "admin") window.location.href = "admin.html";
                        else if(r === "teacher") window.location.href = "teacher.html";
                        else window.location.href = "student.html";
                    }, 1500);
                } else {
                    showiOSToast('fa-solid fa-xmark', 'รหัสผ่านไม่ถูกต้อง', 'bg-rose-100', 'text-rose-600');
                }
            }).catch(e => {
                showiOSToast('fa-solid fa-triangle-exclamation', 'ไม่สามารถเชื่อมต่อได้', 'bg-rose-100', 'text-rose-600');
            });
        }
    </script>
</body>
</html>
