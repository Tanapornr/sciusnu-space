<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SCiUS Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;700&family=Sarabun:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #f1f5f9; 
            background-image: radial-gradient(#6d28d9 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            background-opacity: 0.1;
        }
        h1, h2, h3, .font-prompt { font-family: 'Prompt', sans-serif; }
        .login-card {
            backdrop-filter: blur(10px);
            background-color: rgba(255, 255, 255, 0.9);
        }
    </style>
</head>
<body class="flex h-screen w-screen items-center justify-center p-4">

    <div class="login-card bg-white p-8 md:p-12 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-white/50 text-center">
        <div class="flex items-center justify-center mb-10">
            <div class="w-14 h-14 bg-[#6d28d9] text-white rounded-2xl flex items-center justify-center text-2xl mr-4 shadow-lg shadow-purple-200 transform -rotate-6">
                <i class="fa-solid fa-sparkles"></i>
            </div>
            <div class="text-left">
                <h1 class="text-3xl font-black font-prompt text-[#6d28d9] tracking-tighter uppercase leading-none">Coursue</h1>
                <p class="text-[10px] font-bold text-slate-400 tracking-[0.2em] uppercase mt-1">Learning Space</p>
            </div>
        </div>

        <h2 class="text-xl font-bold text-slate-700 font-prompt mb-2 text-center">ยินดีต้อนรับเข้าสู่ระบบ</h2>
        <p class="text-slate-400 text-sm mb-8 text-center">กรุณาระบุตัวตนเพื่อเริ่มต้นการเรียนรู้</p>
        
        <form onsubmit="event.preventDefault(); login();" class="space-y-5">
            <div class="text-left">
                <label class="block text-xs font-bold text-slate-500 mb-2 ml-1 uppercase tracking-wider">Username</label>
                <div class="relative">
                    <i class="fa-regular fa-user absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="login_user" placeholder="รหัสผู้ใช้งาน" class="w-full pl-12 pr-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-purple-500 focus:bg-white outline-none transition-all shadow-inner" required>
                </div>
            </div>
            
            <div class="text-left">
                <label class="block text-xs font-bold text-slate-500 mb-2 ml-1 uppercase tracking-wider">Password</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="password" id="login_pass" placeholder="รหัสผ่าน" class="w-full pl-12 pr-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-purple-500 focus:bg-white outline-none transition-all shadow-inner" required>
                </div>
            </div>

            <button type="submit" class="w-full bg-[#6d28d9] hover:bg-purple-800 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-purple-200 font-prompt text-lg mt-4 active:scale-[0.98]">
                Sign In <i class="fa-solid fa-arrow-right-to-bracket ml-2 text-sm"></i>
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100">
            <p class="text-[11px] text-slate-400 font-medium uppercase tracking-widest">&copy; 2026 SCiUS Naresuan University</p>
        </div>
    </div>

    <script>
        // =================================================================
        // ⚠️ ใส่ Web App URL ของ Google Apps Script ที่นี่ ⚠️
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbz22baIknv96tjyJYB_qiit6T-owv4qSSUpjA22cZMHXeZ02JnqcPxaQGVUyWzhTubQhA/exec';
        // =================================================================

        // ล้างความจำเก่าทุกครั้งที่เปิดหน้า Login เพื่อความปลอดภัยและแก้ปัญหากระพริบ
        localStorage.removeItem('currentUser');
        sessionStorage.removeItem('currentUser');

        async function login() {
            const username = document.getElementById('login_user').value.trim();
            const password = document.getElementById('login_pass').value.trim();
            
            if(!username || !password) {
                Swal.fire('แจ้งเตือน', 'กรุณากรอกรหัสผู้ใช้งานและรหัสผ่านให้ครบ', 'warning');
                return;
            }
            
            Swal.fire({
                title: 'Signing in...',
                html: 'กำลังตรวจสอบข้อมูลโปรดรอสักครู่',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });
            
            try {
                const response = await fetch(GAS_URL, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: "login", username: username, password: password }) 
                });

                const r = await response.json();

                if(r.status === "success") {
                    // จัดการ Role ให้เป็นตัวเล็กและสะอาดที่สุด
                    const safeRole = String(r.role).toLowerCase().trim();
                    
                    const userObj = { 
                        id: r.username, 
                        name: r.name, 
                        role: safeRole, 
                        assigned: r.assigned, 
                        pic: r.pic, 
                        email: r.email, 
                        phone: r.phone 
                    };
                    
                    // บันทึกแบบ sessionStorage (ปิดแท็บคือหลุดจากระบบ)
                    sessionStorage.setItem('currentUser', JSON.stringify(userObj));
                    
                    Swal.fire({ 
                        icon: 'success', 
                        title: 'เข้าสู่ระบบสำเร็จ', 
                        text: 'ยินดีต้อนรับ ' + r.name,
                        showConfirmButton: false, 
                        timer: 1500 
                    }).then(() => {
                        // แยกส่งไปตามหน้าตามสิทธิ์ที่ได้รับ
                        if(safeRole === 'student') window.location.replace('student.html');
                        else if(safeRole === 'teacher') window.location.replace('teacher.html');
                        else if(safeRole === 'admin') window.location.replace('admin.html');
                        else Swal.fire('Error', 'ไม่พบสิทธิ์การใช้งานที่ถูกต้อง', 'error');
                    });
                } else {
                    Swal.fire('เข้าสู่ระบบล้มเหลว', r.message, 'error');
                }
            } catch(e) {
                console.error("Login Error:", e);
                Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ หรือลิงก์ GAS_URL ไม่ถูกต้อง', 'error');
            }
        }
    </script>
</body>
</html>
